services:
  - class: org.yamcs.http.HttpServer
    args:
      port: 8090
      address: "0.0.0.0"
      cors:
        allowOrigin: "*"
        allowCredentials: false

dataDir: yamcs-data

instances:
  - demo

# Secret key unique to a Yamcs installation; used for cryptographic signing.
# Change this in any real deployment.
secretKey: changeme-estrack-demo
