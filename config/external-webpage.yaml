# Configuration for the external-webpage plugin.
#
# Define one or more pages under 'pages:'. Each entry becomes an item in the yamcs-web
# sidebar (in list order) that embeds its URL in the main view. Values are read at Yamcs
# startup and passed to the web UI, so changes take effect on the next restart -- no
# rebuild required. (The install script copies this file into <yamcs>/etc/.)

pages:
  - label: My Page                 # name shown in the sidebar (required)
    url: https://example.com/      # page embedded in an iframe (required)
    privilege: "*"                 # "*"/blank = all users; else a system privilege (gated)
    icon: public                   # Material Symbols icon name (optional)

  # Add more pages; they appear in this order:
  # - label: Mission Wiki
  #   url: https://wiki.example.org/
  #   privilege: web.Wiki          # only users with this privilege see it
  #   icon: menu_book

# Sidebar group applied to all pages (a per-page 'group:' overrides it). 'archive' renders
# items as standalone entries at the bottom of the instance sidebar with a correct link;
# other groups (telemetry, commanding, procedures, mdb) are accepted but not recommended.
group: archive

# Note: the target site must permit being framed. Sites sending 'X-Frame-Options:
# DENY/SAMEORIGIN' or a restrictive CSP 'frame-ancestors' will refuse to embed.
